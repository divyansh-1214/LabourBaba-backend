
<div id="erd"></div>
<style>
#erd svg { max-width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    secondaryTextColor: dark ? '#9FE1CB' : '#085041',
    tertiaryColor: dark ? '#854F0B' : '#FAEEDA',
    tertiaryTextColor: dark ? '#FAC775' : '#633806',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  CUSTOMER {
    uuid id PK
    string name
    string phone
    string email
    string city
    timestamp created_at
  }
  WORKER {
    uuid id PK
    string name
    string phone
    string profile_picture_url
    string aadhaar_last4
    string verification_status
    float worker_score
    float worker_rating
    int total_jobs_completed
    int years_of_experience
    bool is_online
    timestamp last_seen
    string device_id
    string device_token
    string ip_address
    int decline_count
    int timeout_count
    uuid skill_category_id FK
  }
  SKILL_CATEGORY {
    uuid id PK
    string name
    string icon_url
  }
  JOB {
    uuid id PK
    uuid customer_id FK
    uuid category_id FK
    string description
    float latitude
    float longitude
    geography location
    int budget
    string status
    string dispatch_status
    int current_dispatch_rank
    timestamp created_at
    timestamp deleted_at
  }
  JOB_DISPATCH {
    uuid id PK
    uuid job_id FK
    uuid worker_id FK
    int rank
    string status
    timestamp notified_at
    timestamp responded_at
    timestamp expires_at
  }
  JOB_APPLICATION {
    uuid id PK
    uuid job_id FK
    uuid worker_id FK
    string status
    float distance_km
    float application_score
  }
  BOOKING {
    uuid id PK
    uuid job_id FK
    uuid worker_id FK
    uuid customer_id FK
    timestamp start_time
    string status
    string otp_hash
    bool otp_verified
  }
  REVIEW {
    uuid id PK
    uuid booking_id FK
    uuid worker_id FK
    uuid customer_id FK
    float rating
    string comment
    timestamp created_at
  }
  CONVERSATION {
    uuid id PK
    uuid booking_id FK
    uuid worker_id FK
    uuid customer_id FK
    timestamp created_at
  }
  MESSAGE {
    uuid id PK
    uuid conversation_id FK
    uuid sender_id
    string content
    timestamp created_at
  }
  WORKER_DOCUMENT {
    uuid id PK
    uuid worker_id FK
    string document_type
    string file_url
    string status
  }
  PAYMENT {
    uuid id PK
    uuid booking_id FK
    int amount
    string status
    string razorpay_order_id
    timestamp created_at
  }
  WORKER_LOCATION {
    uuid id PK
    uuid worker_id FK
    float latitude
    float longitude
    geography location
    timestamp updated_at
  }
  NOTIFICATION {
    uuid id PK
    uuid worker_id FK
    uuid job_id FK
    string type
    bool is_read
    timestamp created_at
  }
  WORKER_ANALYTICS {
    uuid id PK
    uuid worker_id FK
    float avg_response_time_s
    float acceptance_rate
    float completion_rate
    timestamp calculated_at
  }
  WORKER_DEVICE {
    uuid id PK
    uuid worker_id FK
    string device_id
    string ip_address
    timestamp first_seen
    timestamp last_seen
  }

  CUSTOMER ||--o{ JOB : posts
  CUSTOMER ||--o{ BOOKING : makes
  WORKER ||--o{ JOB_DISPATCH : receives
  WORKER ||--o{ JOB_APPLICATION : submits
  WORKER ||--o{ WORKER_DOCUMENT : has
  WORKER ||--o{ WORKER_LOCATION : tracks
  WORKER ||--o{ WORKER_ANALYTICS : has
  WORKER ||--o{ WORKER_DEVICE : registers
  JOB ||--o{ JOB_DISPATCH : triggers
  JOB ||--o{ JOB_APPLICATION : receives
  JOB ||--|| BOOKING : results_in
  BOOKING ||--o{ REVIEW : generates
  BOOKING ||--|| PAYMENT : settles
  BOOKING ||--|| CONVERSATION : opens
  CONVERSATION ||--o{ MESSAGE : contains
  WORKER ||--o{ NOTIFICATION : receives
  SKILL_CATEGORY ||--o{ JOB : categorizes
  SKILL_CATEGORY ||--o{ WORKER : classifies
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
